<main class="contato">

  
    <p>
        Ficarei feliz em responder suas dúvidas <br>ou conversar sobre uma futura obra
    </p>

    <form name="contact" netlify>

        <label>Nome *</label>
        <input type="text" required name="name" >

        <label>E-mail (opcional)</label>
        <input type="email" name="email">

        <label>WhatsApp *</label>
        <input type="tel" required name="whatsapp">

        <label>Estou entrando em contato pois busco:</label>

        <select id="motivo" required>

            <option value="">Selecione</option>

            <option>Tirar dúvidas</option>

            <option>Pedir um orçamento</option>

        </select>

        <div id="orcamento" class="orcamento">

            <label>Você tem uma ideia do tamanho da sua tela?</label>

            <input
                type="text"
                placeholder="Ex.: 40x60 cm, 80x120 cm, ainda não sei..."
                name="tamanho-da-tela"
            >

            <label>Você deseja uma pintura utilizando:</label>

            <select name="tinta">

                <option >Selecione</option>

                <option  name="tinta-oleo">Tinta a óleo</option>

                <option name="tinta-acrilica">Tinta acrílica</option>

                <option name="tinta-aquarela">Tinta aquarela    </option>

                <option name="ainda-nao-sei">Ainda não sei</option>

            </select>

        </div>

        <label >Mensagem</label>

        <textarea rows="7" name="message"></textarea>

        <button type="submit">
            Enviar
        </button>

    </form>

</main>
<script>

const motivo = document.getElementById("motivo");
const orcamento = document.getElementById("orcamento");

motivo.addEventListener("change", function(){

    if(this.value === "Pedir um orçamento"){

        orcamento.style.display = "block";

    }else{

        orcamento.style.display = "none";

    }

});

</script>
